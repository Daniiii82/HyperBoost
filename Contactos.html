<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de contacto</title>
    <link rel="icon" href="assets/Imagenes/IconoYlogo.png">
    <link rel="stylesheet" href="assets/Estilos/style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Orbitron:wght@400..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <header>

        <h1>HyperBoost</h1>
        <center>
            <img src="assets/Imagenes/IconoYlogo.png" alt="Logo HyperBoost" class="imagen_contacto">
        </center>
    </header>
    <main>
        <center>
            <div id="formulario">
                <form action="datos.txt">
                    <fieldset>
                        <legend>
                            <h3>Informacion de contacto</h3>
                        </legend>
                        <label for="nombre">Ingrese su nombre:</label>
                        <br>
                        <input type="text" name="nombre" id="nombre" required><br><br>

                        <label for="apellido">Ingrese sus apellidos:</label>
                        <br>
                        <input type="text" name="apellido" id="apellido" required><br><br>

                        <label for="numero">Ingrese su numero celular:</label>
                        <br>
                        <input type="text" name="numero" id="numero" required> <br> <br>

                        <label for="modelo">El modelo del carro</label>
                        <br>
                        <input type="text" name="modelo" id="modelo" required placeholder="Ej: Accent 2001"> <br> <br>


                        <label for="correo">Ingrese su correo:</label>
                        <br>
                        <input type="email" name="correo" id="correo" required> <br> <br>
                        <label for="pais">Ingrese el país</label>
                        <br>
                        <input type="text" name="pais" id="pais" placeholder="Costa Rica" disabled>
                        <p>Marque la opcion de tu interes:</p> <!-- Estos son las casillas de marcar -->
                        <input type="radio" name="turbo" id="turbo">
                        <label for="turbo">GTX3582R</label><br>
                        <input type="radio" name="turbo" id="turbo">
                        <label for="turbo">T04E</label><br>
                        <input type="radio" name="turbo" id="turbo">
                        <label for="turbo">HyperBoost-XTR-900</label><br><br>
                       <button type="submit">Enviar</button><!-- Se crea este boton para darle un estilo unico -->
                    </fieldset>
                </form>
            </div>
            <br><br><br><br><br><br><br><br>
    </main>
    </center>
    <footer><!-- esto es para que no se haga copia de este sitio -->
        <p> &copy; Reservados los derechos a HyperBoost2026 || <a href="HyperBoost Base.html">Volver al Inicio</a></p>
    </footer>
</body>

</html>
